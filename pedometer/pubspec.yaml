name: pedometer
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  # GetX：路由 + 状态管理（对齐 chat）
  get: ^4.6.6
  # 数字 / 日期格式化与国际化
  intl: ^0.20.2
  # 屏幕尺寸适配（设计稿基准 375x812）
  flutter_screenutil: ^5.9.3
  # 折线图 / 面积图（趋势、卡路里、活动时间分析）
  fl_chart: ^0.69.0
  # 运动完成礼花效果
  flutter_confetti: ^0.5.1
  # Google 地图组件
  google_maps_flutter: ^2.17.1
  # 高精度定位与运行时位置权限
  geolocator: ^14.0.2
  # 设备磁力计罗盘朝向（当前位置箭头随手机方向旋转）
  flutter_compass: ^0.8.1
  # 本地健康数据同步：iOS Apple Health / Android Health Connect
  health: ^13.3.1
  # 运动与健身计步：iOS Core Motion / Android Step Counter
  motion_fitness:
    path: plugins/motion_fitness
  # 系统分享面板（分享应用）
  share_plus: ^11.0.0
  # 本地偏好存储（语言选择）
  shared_preferences: ^2.5.5
  # 本地结构化持久化：健康/运动数据日汇总与同步历史
  sqflite: ^2.4.1
  path: ^1.9.0
  # SVG 图标资源
  flutter_svg: ^2.0.17
  file_picker: ^11.0.2
  just_audio: ^0.10.5
  # 应用内评价（iOS SKStoreReviewController）
  in_app_review: ^2.0.12
  # Apple 内购订阅（复用 decibel-meter 的 StoreKit 封装）
  pp_inapp_purchase: ^1.1.0
  # Apple Search Ads 归因（复用 decibel-meter 归因上传逻辑）
  pp_asa_attribution: ^1.0.2
  # 网络请求
  dio: ^5.9.2
  # 请求参数 AES 加密
  encrypt: ^5.0.3
  # 网络连接类型（公共 Header netType）
  connectivity_plus: ^7.1.1
  # 设备信息（公共 Header deviceModel / OS）
  device_info_plus: ^12.4.0
  # 应用包信息（公共 Header appId / appVersion）
  package_info_plus: ^9.0.1
  # 设备唯一标识（userId）生成
  uuid: ^4.5.3
  firebase_core: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_async: ^1.3.2
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/common/resources/
    - lib/feature/home/resources/
    - lib/feature/mine/resources/
    - lib/feature/workout/resources/
    - lib/products/phone/resources/
    - assets/
    - assets/images/
    - assets/subscription/icon/
    - assets/subscription/image/
