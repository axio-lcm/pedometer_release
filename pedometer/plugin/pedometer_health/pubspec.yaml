name: pedometer_health
description: Local Flutter plugin for Apple Health and Health Connect syncing.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.5
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.pedometer_health
        pluginClass: PedometerHealthPlugin
      ios:
        pluginClass: PedometerHealthPlugin
